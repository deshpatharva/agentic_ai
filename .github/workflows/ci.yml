name: CI

on:
  push:
    branches: [main]
    paths:
      - "resume-optimizer/backend/**"
      - "resume-optimizer/requirements.txt"
      - "resume-optimizer/frontend/**"
      - "resume-optimizer/pytest.ini"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend — lint + smoke tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resume-optimizer

    env:
      JWT_SECRET: ci-test-secret-32-chars-long-enough-x
      DATABASE_URL: sqlite+aiosqlite:///./test_ci.db
      ANTHROPIC_API_KEY: test
      google_ai_studio_api_key: test
      groq_api_key: test
      BOOTSTRAP_SECRET: ci-bootstrap-secret-not-real

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: resume-optimizer/requirements.txt

      - name: Install runtime + test dependencies
        run: |
          pip install -r requirements.txt
          pip install \
            asyncpg \
            "sqlalchemy[asyncio]" \
            "python-jose[cryptography]" \
            bcrypt \
            passlib \
            httpx \
            pytest \
            pytest-asyncio \
            aiosqlite \
            ruff

      # en_core_web_sm is now in requirements.txt as a wheel URL (Oryx-compatible).
      # The explicit download here is a fast-path fallback for CI; the wheel
      # installation above already covers it, so this is idempotent.
      - name: Ensure spaCy model is available
        run: python -m spacy validate || python -m spacy download en_core_web_sm

      - name: Lint — ruff
        run: ruff check backend/ --select=E,F,W --ignore=E501

      - name: Import check
        working-directory: resume-optimizer/backend
        run: python -c "import sys; sys.path.insert(0,'.'); import main; print('imports OK')"

      - name: Smoke tests
        run: pytest --tb=short -v

      - name: Migration smoke test
        working-directory: resume-optimizer/backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test_migrate_ci.db
        run: |
          alembic upgrade head
          alembic check || echo "alembic check reported drift (SQLite enum rendering) — review locally against PostgreSQL"
          rm -f test_migrate_ci.db

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resume-optimizer/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: resume-optimizer/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
