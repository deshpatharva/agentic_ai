name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - "resume-optimizer/infra/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "plan-only → inspect the plan; apply → deploy after reviewer approval"
        required: true
        type: choice
        options: [plan-only, apply]
        default: plan-only

concurrency:
  group: terraform
  cancel-in-progress: false

permissions:
  id-token: write      # required for OIDC token exchange
  contents: write
  pull-requests: write # required to post plan as PR comment

env:
  ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC:        "true"

jobs:
  # ── Plan ─────────────────────────────────────────────────────────────────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resume-optimizer/infra

    env:
      TF_VAR_subscription_id:    ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_google_ai_api_key:  ${{ secrets.TF_VAR_GOOGLE_AI_API_KEY }}
      TF_VAR_groq_api_key:       ${{ secrets.TF_VAR_GROQ_API_KEY }}
      TF_VAR_anthropic_api_key:  ${{ secrets.TF_VAR_ANTHROPIC_API_KEY }}
      TF_VAR_client_id:          ${{ secrets.AZURE_CLIENT_ID }}
      TF_VAR_app_object_id:      ${{ secrets.AZURE_APP_OBJECT_ID }}
      TF_VAR_sp_object_id:       ${{ secrets.AZURE_SP_OBJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Format
        run: terraform fmt -recursive

      - name: Commit formatted Terraform code
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format terraform files"
          # file_pattern: "*.tf *.tfvars"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.AZURE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TFSTATE_STORAGE_ACCOUNT_NAME }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=resume-optimizer/dev/terraform.tfstate" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan \
            -detailed-exitcode \
            -no-color \
            -out=tfplan \
            2>&1 | tee plan_output.txt
          exitcode=${PIPESTATUS[0]}
          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT
          [ $exitcode -eq 1 ] && exit 1 || exit 0

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: |
            resume-optimizer/infra/tfplan
            resume-optimizer/infra/plan_output.txt
          retention-days: 1

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('resume-optimizer/infra/plan_output.txt', 'utf8');
            const plan = raw.length > 60000
              ? '... (output truncated — see workflow logs for full plan)\n\n' + raw.slice(-60000)
              : raw;

            const header = '## Terraform Plan\n';
            const body   = `${header}\`\`\`hcl\n${plan}\n\`\`\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments) {
              if (c.body.startsWith(header)) {
                await github.rest.issues.deleteComment({
                  owner:      context.repo.owner,
                  repo:       context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  # ── Apply ─────────────────────────────────────────────────────────────────────
  apply:
    name: Terraform Apply
    needs: plan
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'apply'
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: resume-optimizer/infra

    env:
      TF_VAR_subscription_id:   ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_google_ai_api_key: ${{ secrets.TF_VAR_GOOGLE_AI_API_KEY }}
      TF_VAR_groq_api_key:      ${{ secrets.TF_VAR_GROQ_API_KEY }}
      TF_VAR_anthropic_api_key: ${{ secrets.TF_VAR_ANTHROPIC_API_KEY }}
      TF_VAR_client_id:         ${{ secrets.AZURE_CLIENT_ID }}
      TF_VAR_app_object_id:     ${{ secrets.AZURE_APP_OBJECT_ID }}
      TF_VAR_sp_object_id:      ${{ secrets.AZURE_SP_OBJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.AZURE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TFSTATE_STORAGE_ACCOUNT_NAME }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=resume-optimizer/dev/terraform.tfstate" \
            -backend-config="use_azuread_auth=true"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: resume-optimizer/infra

      - name: Terraform Apply
        run: terraform apply -auto-approve -no-color tfplan
