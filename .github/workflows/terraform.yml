name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - "resume-optimizer/infra/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, staging, prod]
        default: dev
      action:
        description: "plan-only → inspect the plan; apply → deploy after approval"
        required: true
        type: choice
        options: [plan-only, apply]
        default: plan-only

concurrency:
  group: terraform-${{ inputs.environment || 'dev' }}
  cancel-in-progress: false

permissions:
  id-token: write      # required for OIDC token exchange
  contents: write
  pull-requests: write # required to post plan as PR comment

env:
  ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC:        "true"
  TF_ENV:              ${{ inputs.environment || 'dev' }}

jobs:
  # ── Plan ─────────────────────────────────────────────────────────────────────
  plan:
    name: Terraform Plan (${{ inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resume-optimizer/infra

    env:
      TF_VAR_environment:       ${{ inputs.environment || 'dev' }}
      TF_VAR_google_ai_api_key: ${{ secrets.TF_VAR_GOOGLE_AI_API_KEY }}
      TF_VAR_groq_api_key:      ${{ secrets.TF_VAR_GROQ_API_KEY }}
      TF_VAR_anthropic_api_key: ${{ secrets.TF_VAR_ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Format
        run: terraform fmt -recursive

      - name: Commit formatted Terraform code
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format terraform files"

      - name: Resolve backend config
        run: |
          case "$TF_ENV" in
            dev)     echo "ENV_SUFFIX=devnp" >> $GITHUB_ENV ;;
            staging) echo "ENV_SUFFIX=stgnp" >> $GITHUB_ENV ;;
            prod)    echo "ENV_SUFFIX=prodp" >> $GITHUB_ENV ;;
          esac

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=resumeai-rg-${TF_ENV}" \
            -backend-config="storage_account_name=resumeaitfst${ENV_SUFFIX}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=resume-optimizer/${TF_ENV}/terraform.tfstate" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Import existing resources (idempotent)
        run: |
          PREFIX="resumeai"
          RG="${PREFIX}-rg-${TF_ENV}"

          import_if_missing() {
            local addr="$1" id="$2"
            terraform state show "$addr" > /dev/null 2>&1 && return 0
            terraform import "$addr" "$id" || true
          }

          import_if_missing azurerm_resource_group.main \
            "/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${RG}"

          import_if_missing azurerm_storage_account.tfstate \
            "/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${RG}/providers/Microsoft.Storage/storageAccounts/${PREFIX}tfst${ENV_SUFFIX}"

          import_if_missing azurerm_storage_container.tfstate \
            "/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${RG}/providers/Microsoft.Storage/storageAccounts/${PREFIX}tfst${ENV_SUFFIX}/blobServices/default/containers/tfstate"

          import_if_missing azurerm_key_vault.main \
            "/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${RG}/providers/Microsoft.KeyVault/vaults/${PREFIX}kv${ENV_SUFFIX}"

          import_if_missing azurerm_storage_account.main \
            "/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${RG}/providers/Microsoft.Storage/storageAccounts/${PREFIX}st${ENV_SUFFIX}"

          import_if_missing azurerm_service_plan.main \
            "/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${RG}/providers/Microsoft.Web/serverFarms/${PREFIX}-asp-${TF_ENV}"

          import_if_missing azurerm_postgresql_flexible_server.main \
            "/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${RG}/providers/Microsoft.DBforPostgreSQL/flexibleServers/${PREFIX}-pg-${TF_ENV}"

          import_if_missing azurerm_static_web_app.frontend \
            "/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${RG}/providers/Microsoft.Web/staticSites/${PREFIX}-web-${TF_ENV}"

          # Role assignment on tfstate account — GUID-based ID, look it up dynamically
          TFSTATE_SCOPE="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${RG}/providers/Microsoft.Storage/storageAccounts/${PREFIX}tfst${ENV_SUFFIX}"
          RA_ID=$(az role assignment list --scope "$TFSTATE_SCOPE" \
            --role "Storage Blob Data Contributor" \
            --query "[0].id" -o tsv 2>/dev/null || true)
          if [ -n "$RA_ID" ] && [ "$RA_ID" != "None" ]; then
            import_if_missing azurerm_role_assignment.terraform_tfstate "$RA_ID"
          fi

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan \
            -detailed-exitcode \
            -no-color \
            -out=tfplan \
            2>&1 | tee plan_output.txt
          exitcode=${PIPESTATUS[0]}
          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT
          [ $exitcode -eq 1 ] && exit 1 || exit 0

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: |
            resume-optimizer/infra/tfplan
            resume-optimizer/infra/plan_output.txt
          retention-days: 1

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('resume-optimizer/infra/plan_output.txt', 'utf8');
            const plan = raw.length > 60000
              ? '... (output truncated — see workflow logs for full plan)\n\n' + raw.slice(-60000)
              : raw;

            const header = '## Terraform Plan\n';
            const body   = `${header}\`\`\`hcl\n${plan}\n\`\`\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments) {
              if (c.body.startsWith(header)) {
                await github.rest.issues.deleteComment({
                  owner:      context.repo.owner,
                  repo:       context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  # ── Apply ────────────────────────────────────────────────────────────────────
  apply:
    name: Terraform Apply (${{ inputs.environment }})
    needs: plan
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'apply'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}   # maps to GitHub env → required reviewers per env
    defaults:
      run:
        working-directory: resume-optimizer/infra

    env:
      TF_VAR_environment:       ${{ inputs.environment }}
      TF_VAR_google_ai_api_key: ${{ secrets.TF_VAR_GOOGLE_AI_API_KEY }}
      TF_VAR_groq_api_key:      ${{ secrets.TF_VAR_GROQ_API_KEY }}
      TF_VAR_anthropic_api_key: ${{ secrets.TF_VAR_ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Resolve backend config
        run: |
          case "$TF_ENV" in
            dev)     echo "ENV_SUFFIX=devnp" >> $GITHUB_ENV ;;
            staging) echo "ENV_SUFFIX=stgnp" >> $GITHUB_ENV ;;
            prod)    echo "ENV_SUFFIX=prodp" >> $GITHUB_ENV ;;
          esac

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=resumeai-rg-${TF_ENV}" \
            -backend-config="storage_account_name=resumeaitfst${ENV_SUFFIX}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=resume-optimizer/${TF_ENV}/terraform.tfstate" \
            -backend-config="use_azuread_auth=true"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: resume-optimizer/infra

      - name: Terraform Apply
        run: terraform apply -auto-approve -no-color tfplan
