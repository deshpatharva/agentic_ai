name: Deploy — Backend

# Triggers when backend code or dependencies change on main.
# Also manually dispatchable for hotfix deploys or first-time setup.
on:
  push:
    branches: [main]
    paths:
      - "resume-optimizer/backend/**"
      - "resume-optimizer/requirements.txt"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false # never cancel a deploy mid-flight

permissions:
  id-token: write  # required for OIDC token exchange with Azure
  contents: read

jobs:
  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4

      # ── OIDC login — no client secret stored anywhere ─────────────────────────
      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Prepare deployment package ────────────────────────────────────────────
      # requirements.txt lives one level above backend/ in the repo, so we copy
      # it in before zipping.
      - name: Prepare package
        run: |
          cp resume-optimizer/requirements.txt resume-optimizer/backend/requirements.txt

      # ── Create deployment zip ─────────────────────────────────────────────────
      - name: Zip package
        run: |
          cd resume-optimizer/backend
          zip -r /tmp/backend-deploy.zip . \
            --exclude="*.pyc" \
            --exclude="*/__pycache__/*"

      # ── Deploy via classic ZipDeploy (always triggers Oryx server-side build) ─
      # azure/webapps-deploy@v3 uses OneDeploy (/api/publish) which only rebuilds
      # when requirements.txt changes. The classic zip deploy endpoint
      # (/api/zipdeploy) always triggers Oryx when SCM_DO_BUILD_DURING_DEPLOYMENT
      # is true, regardless of which files changed.
      - name: Deploy to App Service
        run: |
          APP_NAME="${{ secrets.AZURE_WEBAPP_NAME }}"
          ENV="${APP_NAME##*-}"
          RESOURCE_GROUP="resumeai-rg-${ENV}"

          # The CLI polls until the container responds to HTTP pings. Our container
          # takes ~4-6 min to import spaCy+CrewAI — longer than the CLI poll window.
          # Build success is what matters; container startup is monitored separately.
          az webapp deployment source config-zip \
            --resource-group "$RESOURCE_GROUP" \
            --name "$APP_NAME" \
            --src /tmp/backend-deploy.zip \
          || { echo "CLI polling timed out (build succeeded — container still warming up)"; true; }

      # ── Wait for container + confirm migrations ran ───────────────────────────
      # The startup command runs `alembic upgrade head` before uvicorn, so a
      # healthy response means migrations have already been applied.
      - name: Wait for app to be healthy (confirms migrations ran)
        run: |
          APP_NAME="${{ secrets.AZURE_WEBAPP_NAME }}"
          ENV="${APP_NAME##*-}"
          RESOURCE_GROUP="resumeai-rg-${ENV}"
          HOSTNAME=$(az webapp show \
            --resource-group "$RESOURCE_GROUP" \
            --name "$APP_NAME" \
            --query defaultHostName -o tsv)
          URL="https://${HOSTNAME}/health"

          echo "Polling ${URL} — container takes ~3-5 min to import spaCy+CrewAI..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || true)
            if [ "$STATUS" = "200" ]; then
              echo "App is healthy (HTTP 200) — alembic migrations complete"
              exit 0
            fi
            echo "  attempt $i/30: HTTP ${STATUS} — waiting 30s"
            sleep 30
          done
          echo "WARNING: app did not become healthy within 15 min — check Azure logs"
          exit 1
